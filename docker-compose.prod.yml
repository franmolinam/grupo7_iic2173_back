# Es el docker compose de produccion, usa la imagen de ECR
services:
  api:
    # Es el URI del ECR
    image: ${API_IMAGE_URI}:latest
    container_name: cityexpress_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    # agregue esto pq la API arranca antes q la DB esté lista
    depends_on:
      db:
        condition: service_healthy
    restart: always

  db:
    image: postgres:15-alpine
    container_name: cityexpress_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # healthcheck para asegurarse de que la base de datos esté lista antes de que la API intente conectarse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: