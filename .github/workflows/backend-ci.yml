name: CI Backend

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/testdb
      CODIGO_CIUDAD: LSN
      RABBITMQ_HOST: localhost
      RABBITMQ_PORT: 5671
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      AUTH0_DOMAIN: test.auth0.com
      AUTH0_AUDIENCE: test-audience

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov

      - name: Lint (flake8)
        run: |
          flake8 src/ --max-line-length=150 --ignore=E302,E303,W291,W292,W293,E501,E261,E262,E265,E122,E231,E401,E402

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short